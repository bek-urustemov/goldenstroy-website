    a{color:#C9A96E;text-decoration:none}
    .card{border:1px solid rgba(201,169,110,.25);background:#111a2b;padding:24px}

    .plans-grid{

    .plan-card{

    .plan-card p{
      margin:0;
      color:#d2c8bb;
      font-size:.92rem;
      line-height:1.5;
      max-width:none;
    }
    @media (max-width:640px){
      .plans-grid{grid-template-columns:1fr}
    }
  </style>
