<!doctype html>
<html lang="ru" data-page="yntymak">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЖК ЫНТЫМАК — GOLDEN STROY</title>
  <style>
    body{
      margin:0;
      background:#070d1a;
      color:#f5f0eb;
      font-family:Inter,system-ui,sans-serif;
      display:flex;
      justify-content:center;
    }

    .wrap{
      width:min(860px,92%);
      margin:40px auto;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    a{
      color:#C9A96E;
      text-decoration:none;
      align-self:flex-start;
    }

    .card{
      border:1px solid rgba(201,169,110,.25);
      background:#111a2b;
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    img{
      width:30%;
      max-width:260px;
      min-width:160px;
      height:auto;
      display:block;
      margin:0;
    }

    h1{
      margin:0;
      font-family:"Playfair Display",serif;
      letter-spacing:.05em;
      text-transform:uppercase;
      line-height:1.25;
    }

    p{
      margin:0;
      color:#d2c8bb;
      line-height:1.8;
      max-width:68ch;
    }

    .plans-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:6px;
    }
    .plan-card{
      border:1px solid rgba(201,169,110,.25);
      background:#0d1424;
      padding:10px;
    }
    .plan-card img{
      width:100%;
      min-width:0;
      max-width:none;
      display:block;
      margin:0 0 8px;
    }
    .plan-card p{
      margin:0;
      color:#d2c8bb;
      font-size:.92rem;
      line-height:1.5;
      max-width:none;
    }

    @media (max-width:640px){
      .card{padding:20px}
      img{width:55%;max-width:none}
      .plans-grid{grid-template-columns:1fr}
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .lang-switch{
      display:inline-flex;
      align-items:center;
      border:1px solid rgba(201,169,110,.5);
      background:#0d1424;
      border-radius:999px;
      padding:3px;
      gap:2px;
    }
    .lang-btn{
      min-width:42px;
      height:30px;
      border:0;
      background:transparent;
      color:#C9A96E;
      border-radius:999px;
      font-weight:600;
      cursor:pointer;
    }
    .lang-btn.active{
      background:#C9A96E;
      color:#111;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <p><a href="../index.html" data-i18n="back">← Назад</a></p>
      <div class="lang-switch" role="group" aria-label="Language switch">
        <button class="lang-btn" data-lang="ru" aria-pressed="true">RU</button>
        <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
      </div>
    </div>

    <article class="card">
      <img src="../assets/src/yntymak-jk.png" alt="ЖК ЫНТЫМАК">
      <h1 data-i18n="h1">Жилой комплекс «ЫНТЫМАК»</h1>
      <p data-i18n="desc">«ЫНТЫМАК» был построен сдан в эксплуатацию в 2020. Расположена на  Калык Акиева 116.</p>

      <h2 class="section-title" data-i18n="plansTitle">Планировки</h2>
      <div class="plans-grid">
        <div class="plan-card">
          <img src="../assets/src/yntymak-plan-1.png" alt="ЫНТЫМАК — планировка 1">
          <p data-i18n="plan1">1-комнатная • 40 м²</p>
        </div>
        <div class="plan-card">
          <img src="../assets/src/yntymak-plan-2.png" alt="ЫНТЫМАК — планировка 2">
          <p data-i18n="plan2">2-комнатная • 63 м²</p>
        </div>
        <div class="plan-card">
          <img src="../assets/src/yntymak-plan-3.png" alt="ЫНТЫМАК — планировка 3">
          <p data-i18n="plan3">3-комнатная • 88 м²</p>
        </div>
      </div>

      <h2 class="section-title" data-i18n="galleryTitle">Галерея проекта</h2>
      <img src="../assets/src/yntymak-gallery-1.png" alt="Галерея проекта">
      <img src="../assets/src/yntymak-gallery-2.png" alt="Галерея проекта">
      <img src="../assets/src/yntymak-gallery-3.png" alt="Галерея проекта">
    </article>
  </div>

  <script src="../assets/js/project-i18n.js" defer></script>
</body>
</html>
